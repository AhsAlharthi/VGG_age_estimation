name: age-architecture-study
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.11
  # For many systems, these lines are enough for a CPU environment.
  # If you want GPU acceleration, keep the rest of this file the same,
  # but replace the PyTorch install with the exact command generated by
  # PyTorch's official "Start Locally" selector for your OS and CUDA.
  - pytorch
  - torchvision
  - numpy
  - pandas
  - pillow
  - matplotlib
  - scikit-learn
  - pyyaml
  - tqdm
  - pip
